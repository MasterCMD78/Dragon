openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: HustleCoin V2 API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Telegram authentication
  - name: users
    description: User management
  - name: mining
    description: Mining operations
  - name: referrals
    description: Referral system
  - name: leaderboard
    description: Leaderboard rankings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/telegram:
    post:
      operationId: telegramAuth
      tags: [auth]
      summary: Authenticate via Telegram Mini App
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramAuthInput"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid Telegram data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/me:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get full user profile with stats
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/stats:
    get:
      operationId: getUserStats
      tags: [users]
      summary: Get user statistics summary
      responses:
        "200":
          description: User stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mining/status:
    get:
      operationId: getMiningStatus
      tags: [mining]
      summary: Get current mining session status
      responses:
        "200":
          description: Mining status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiningStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mining/start:
    post:
      operationId: startMining
      tags: [mining]
      summary: Start a new 24-hour mining session
      responses:
        "200":
          description: Mining session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiningStatus"
        "400":
          description: Session already active or not claimable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mining/claim:
    post:
      operationId: claimMining
      tags: [mining]
      summary: Claim rewards from a completed mining session
      responses:
        "200":
          description: Rewards claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiningClaimResult"
        "400":
          description: Session not complete or no active session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mining/history:
    get:
      operationId: getMiningHistory
      tags: [mining]
      summary: Get paginated mining history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Mining history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiningHistoryResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /referrals/stats:
    get:
      operationId: getReferralStats
      tags: [referrals]
      summary: Get referral statistics for the current user
      responses:
        "200":
          description: Referral stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralStats"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /referrals/users:
    get:
      operationId: getReferralUsers
      tags: [referrals]
      summary: Get list of users referred by the current user
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Referred users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralUsersResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /referrals/rewards:
    get:
      operationId: getReferralRewards
      tags: [referrals]
      summary: Get referral reward history for the current user
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Referral rewards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralRewardsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leaderboard/global:
    get:
      operationId: getLeaderboardGlobal
      tags: [leaderboard]
      summary: Get global leaderboard ranked by HP balance
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Global leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardGlobalResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leaderboard/mining:
    get:
      operationId: getLeaderboardMining
      tags: [leaderboard]
      summary: Get mining leaderboard ranked by total mines and streak
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Mining leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardMiningResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leaderboard/referrals:
    get:
      operationId: getLeaderboardReferrals
      tags: [leaderboard]
      summary: Get referral leaderboard ranked by referral count and HP
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Referral leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardReferralsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leaderboard/me:
    get:
      operationId: getLeaderboardMe
      tags: [leaderboard]
      summary: Get the current user's rank on all leaderboards
      responses:
        "200":
          description: User's leaderboard ranks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardMyRank"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    TelegramAuthInput:
      type: object
      required: [initData]
      properties:
        initData:
          type: string
        referralCode:
          type: ["string", "null"]

    User:
      type: object
      required: [id, telegramId, username, firstName, balance, level, streak, totalMines, isAdmin, isBanned, joinDate]
      properties:
        id:
          type: integer
        telegramId:
          type: string
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: ["string", "null"]
        balance:
          type: integer
        level:
          type: integer
        streak:
          type: integer
        totalMines:
          type: integer
        referredBy:
          type: ["string", "null"]
        referralCode:
          type: string
        isAdmin:
          type: boolean
        isBanned:
          type: boolean
        joinDate:
          type: string
        lastMine:
          type: ["string", "null"]

    AuthResult:
      type: object
      required: [user, isNewUser]
      properties:
        user:
          $ref: "#/components/schemas/User"
        isNewUser:
          type: boolean

    UserProfile:
      type: object
      required: [id, telegramId, username, firstName, balance, level, streak, totalMines, referralCode, totalReferrals, isAdmin, isBanned, joinDate]
      properties:
        id:
          type: integer
        telegramId:
          type: string
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: ["string", "null"]
        balance:
          type: integer
        level:
          type: integer
        streak:
          type: integer
        totalMines:
          type: integer
        referralCode:
          type: string
        referredBy:
          type: ["string", "null"]
        totalReferrals:
          type: integer
        isAdmin:
          type: boolean
        isBanned:
          type: boolean
        joinDate:
          type: string
        lastMine:
          type: ["string", "null"]

    UserStats:
      type: object
      required: [balance, streak, totalMines, totalReferrals, globalRank, canMineNow]
      properties:
        balance:
          type: integer
        streak:
          type: integer
        totalMines:
          type: integer
        totalReferrals:
          type: integer
        globalRank:
          type: integer
        canMineNow:
          type: boolean
        nextMineAt:
          type: ["string", "null"]

    MiningStatus:
      type: object
      required: [state, balance, streak, totalMines, miningRate, estimatedReward]
      properties:
        state:
          type: string
          enum: [idle, mining, claimable]
          description: "idle = no session; mining = session active, timer running; claimable = session complete, ready to claim"
        sessionStartedAt:
          type: ["string", "null"]
          description: ISO timestamp when session started
        sessionEndsAt:
          type: ["string", "null"]
          description: ISO timestamp when session completes (sessionStartedAt + 24h)
        secondsRemaining:
          type: ["integer", "null"]
          description: Seconds left in the current session
        balance:
          type: integer
        streak:
          type: integer
        totalMines:
          type: integer
        miningRate:
          type: number
          description: HP earned per hour in current/next session
        estimatedReward:
          type: integer
          description: Total HP that will be earned when session completes
        lastClaimedAt:
          type: ["string", "null"]

    MiningClaimResult:
      type: object
      required: [hpEarned, bonusHp, totalReward, newBalance, newStreak, newTotalMines]
      properties:
        hpEarned:
          type: integer
          description: Base HP earned
        bonusHp:
          type: integer
          description: Streak bonus HP
        totalReward:
          type: integer
          description: Total HP added to balance
        newBalance:
          type: integer
        newStreak:
          type: integer
        newTotalMines:
          type: integer

    MiningLogEntry:
      type: object
      required: [id, hpEarned, bonusHp, totalHp, streak, minedAt]
      properties:
        id:
          type: integer
        hpEarned:
          type: integer
        bonusHp:
          type: integer
        totalHp:
          type: integer
        streak:
          type: integer
        minedAt:
          type: string

    MiningHistoryResponse:
      type: object
      required: [entries, total]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/MiningLogEntry"
        total:
          type: integer

    ReferralStats:
      type: object
      required: [totalReferred, totalHpEarned, referralCode, referralLink]
      properties:
        totalReferred:
          type: integer
        totalHpEarned:
          type: integer
        referralCode:
          type: string
        referralLink:
          type: string

    ReferralUserEntry:
      type: object
      required: [id, refereeTelegramId, firstName, username, hpEarned, joinedAt]
      properties:
        id:
          type: integer
        refereeTelegramId:
          type: string
        firstName:
          type: string
        username:
          type: string
        hpEarned:
          type: integer
        joinedAt:
          type: string

    ReferralUsersResponse:
      type: object
      required: [entries, total]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ReferralUserEntry"
        total:
          type: integer

    ReferralRewardEntry:
      type: object
      required: [id, refereeTelegramId, firstName, username, hpEarned, earnedAt]
      properties:
        id:
          type: integer
        refereeTelegramId:
          type: string
        firstName:
          type: string
        username:
          type: string
        hpEarned:
          type: integer
        earnedAt:
          type: string

    ReferralRewardsResponse:
      type: object
      required: [entries, total]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ReferralRewardEntry"
        total:
          type: integer

    LeaderboardGlobalEntry:
      type: object
      required: [rank, telegramId, username, firstName, level, balance]
      properties:
        rank:
          type: integer
        telegramId:
          type: string
        username:
          type: string
        firstName:
          type: string
        level:
          type: integer
        balance:
          type: integer

    LeaderboardGlobalResponse:
      type: object
      required: [entries, total]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardGlobalEntry"
        total:
          type: integer

    LeaderboardMiningEntry:
      type: object
      required: [rank, telegramId, username, firstName, totalMines, streak]
      properties:
        rank:
          type: integer
        telegramId:
          type: string
        username:
          type: string
        firstName:
          type: string
        totalMines:
          type: integer
        streak:
          type: integer

    LeaderboardMiningResponse:
      type: object
      required: [entries, total]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardMiningEntry"
        total:
          type: integer

    LeaderboardReferralEntry:
      type: object
      required: [rank, telegramId, username, firstName, totalReferrals, totalReferralHp]
      properties:
        rank:
          type: integer
        telegramId:
          type: string
        username:
          type: string
        firstName:
          type: string
        totalReferrals:
          type: integer
        totalReferralHp:
          type: integer

    LeaderboardReferralsResponse:
      type: object
      required: [entries, total]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardReferralEntry"
        total:
          type: integer

    LeaderboardMyRank:
      type: object
      required: [globalRank, miningRank, referralRank, balance, totalMines, streak, totalReferrals, totalReferralHp]
      properties:
        globalRank:
          type: integer
        miningRank:
          type: integer
        referralRank:
          type: integer
        balance:
          type: integer
        totalMines:
          type: integer
        streak:
          type: integer
        totalReferrals:
          type: integer
        totalReferralHp:
          type: integer
