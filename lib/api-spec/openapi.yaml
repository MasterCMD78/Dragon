openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: HustleCoin V2 API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Telegram authentication
  - name: users
    description: User management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/telegram:
    post:
      operationId: telegramAuth
      tags: [auth]
      summary: Authenticate via Telegram Mini App
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramAuthInput"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid Telegram data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/me:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get full user profile with stats
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/stats:
    get:
      operationId: getUserStats
      tags: [users]
      summary: Get user statistics summary
      responses:
        "200":
          description: User stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    TelegramAuthInput:
      type: object
      required: [initData]
      properties:
        initData:
          type: string
          description: Raw Telegram initData string from window.Telegram.WebApp.initData
        referralCode:
          type: ["string", "null"]
          description: Referrer's Telegram ID passed as the start_param

    User:
      type: object
      required: [id, telegramId, username, firstName, balance, level, streak, totalMines, isAdmin, isBanned, joinDate]
      properties:
        id:
          type: integer
        telegramId:
          type: string
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: ["string", "null"]
        balance:
          type: integer
          description: Current HP balance
        level:
          type: integer
        streak:
          type: integer
          description: Mining streak in days
        totalMines:
          type: integer
          description: Total number of times mined
        referredBy:
          type: ["string", "null"]
          description: Telegram ID of the user who referred them
        referralCode:
          type: string
          description: This user's referral code (their telegram ID)
        isAdmin:
          type: boolean
        isBanned:
          type: boolean
        joinDate:
          type: string
        lastMine:
          type: ["string", "null"]

    AuthResult:
      type: object
      required: [user, isNewUser]
      properties:
        user:
          $ref: "#/components/schemas/User"
        isNewUser:
          type: boolean

    UserProfile:
      type: object
      required: [id, telegramId, username, firstName, balance, level, streak, totalMines, referralCode, totalReferrals, isAdmin, isBanned, joinDate]
      properties:
        id:
          type: integer
        telegramId:
          type: string
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: ["string", "null"]
        balance:
          type: integer
        level:
          type: integer
        streak:
          type: integer
        totalMines:
          type: integer
        referralCode:
          type: string
          description: Telegram ID used as the referral code
        referredBy:
          type: ["string", "null"]
        totalReferrals:
          type: integer
        isAdmin:
          type: boolean
        isBanned:
          type: boolean
        joinDate:
          type: string
        lastMine:
          type: ["string", "null"]

    UserStats:
      type: object
      required: [balance, streak, totalMines, totalReferrals, globalRank, canMineNow]
      properties:
        balance:
          type: integer
        streak:
          type: integer
        totalMines:
          type: integer
        totalReferrals:
          type: integer
        globalRank:
          type: integer
        canMineNow:
          type: boolean
        nextMineAt:
          type: ["string", "null"]
