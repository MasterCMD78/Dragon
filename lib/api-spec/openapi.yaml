openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: HustleCoin V2 API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Telegram authentication
  - name: users
    description: User management
  - name: mining
    description: Mining operations
  - name: referrals
    description: Referral system
  - name: leaderboard
    description: Leaderboard rankings
  - name: tasks
    description: Tasks and rewards
  - name: quests
    description: Quests and progress tracking
  - name: achievements
    description: Achievements and milestone tracking
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/telegram:
    post:
      operationId: telegramAuth
      tags: [auth]
      summary: Authenticate via Telegram Mini App
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramAuthInput"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid Telegram data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/me:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get full user profile with stats
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/stats:
    get:
      operationId: getUserStats
      tags: [users]
      summary: Get user statistics summary
      responses:
        "200":
          description: User stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mining/status:
    get:
      operationId: getMiningStatus
      tags: [mining]
      summary: Get current mining session status
      responses:
        "200":
          description: Mining status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiningStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mining/start:
    post:
      operationId: startMining
      tags: [mining]
      summary: Start a new 24-hour mining session
      responses:
        "200":
          description: Mining session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiningStatus"
        "400":
          description: Session already active or not claimable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mining/claim:
    post:
      operationId: claimMining
      tags: [mining]
      summary: Claim rewards from a completed mining session
      responses:
        "200":
          description: Rewards claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiningClaimResult"
        "400":
          description: Session not complete or no active session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mining/history:
    get:
      operationId: getMiningHistory
      tags: [mining]
      summary: Get paginated mining history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Mining history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiningHistoryResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /referrals/stats:
    get:
      operationId: getReferralStats
      tags: [referrals]
      summary: Get referral statistics for the current user
      responses:
        "200":
          description: Referral stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralStats"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /referrals/users:
    get:
      operationId: getReferralUsers
      tags: [referrals]
      summary: Get list of users referred by the current user
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Referred users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralUsersResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /referrals/rewards:
    get:
      operationId: getReferralRewards
      tags: [referrals]
      summary: Get referral reward history for the current user
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Referral rewards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralRewardsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leaderboard/global:
    get:
      operationId: getLeaderboardGlobal
      tags: [leaderboard]
      summary: Get global leaderboard ranked by HP balance
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Global leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardGlobalResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leaderboard/mining:
    get:
      operationId: getLeaderboardMining
      tags: [leaderboard]
      summary: Get mining leaderboard ranked by total mines and streak
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Mining leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardMiningResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leaderboard/referrals:
    get:
      operationId: getLeaderboardReferrals
      tags: [leaderboard]
      summary: Get referral leaderboard ranked by referral count and HP
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Referral leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardReferralsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leaderboard/me:
    get:
      operationId: getLeaderboardMe
      tags: [leaderboard]
      summary: Get the current user's rank on all leaderboards
      responses:
        "200":
          description: User's leaderboard ranks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardMyRank"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /quests:
    get:
      operationId: getQuests
      tags: [quests]
      summary: List all quests with current user's progress
      responses:
        "200":
          description: Quest list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestsListResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /quests/{id}:
    get:
      operationId: getQuestById
      tags: [quests]
      summary: Get a single quest with current user's progress
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quest detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestItem"
        "404":
          description: Quest not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /quests/{id}/start:
    post:
      operationId: startQuest
      tags: [quests]
      summary: Ensure a progress row exists for the current period
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quest started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestItem"
        "404":
          description: Quest not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /quests/{id}/progress:
    post:
      operationId: updateQuestProgress
      tags: [quests]
      summary: Recompute and persist current progress for a quest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated quest progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestItem"
        "404":
          description: Quest not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /quests/{id}/claim:
    post:
      operationId: claimQuestReward
      tags: [quests]
      summary: Atomically claim reward for a completed quest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reward claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestClaimResult"
        "400":
          description: Quest not completed or reward already claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Quest not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tasks:
    get:
      operationId: getTasks
      tags: [tasks]
      summary: List all active tasks with the current user's status
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TasksListResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tasks/{id}:
    get:
      operationId: getTaskById
      tags: [tasks]
      summary: Get a single task with the current user's status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskItem"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tasks/{id}/start:
    post:
      operationId: startTask
      tags: [tasks]
      summary: Mark a task as in progress
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskItem"
        "400":
          description: Task already completed or pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tasks/{id}/complete:
    post:
      operationId: completeTask
      tags: [tasks]
      summary: Complete a task. Automatic tasks grant reward immediately; manual tasks go to pending approval.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task completion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskActionResult"
        "400":
          description: Already completed, pending, or condition not met
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tasks/{id}/claim:
    post:
      operationId: claimTaskReward
      tags: [tasks]
      summary: Claim reward for a manually approved task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reward claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskActionResult"
        "400":
          description: Nothing to claim or already claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /achievements:
    get:
      operationId: getAchievements
      tags: [achievements]
      summary: List all achievements with the current user's status
      responses:
        "200":
          description: Achievement list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AchievementsListResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /achievements/check:
    post:
      operationId: checkAchievements
      tags: [achievements]
      summary: Run a full achievement sweep for the current user and unlock any newly eligible achievements
      responses:
        "200":
          description: Check result with any new unlocks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AchievementCheckResult"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /achievements/{id}:
    get:
      operationId: getAchievementById
      tags: [achievements]
      summary: Get a single achievement with the current user's status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Achievement detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AchievementItem"
        "404":
          description: Achievement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    QuestItem:
      type: object
      required: [id, title, description, reward, questType, category, target, progress, completed, claimed, periodKey]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        reward:
          type: integer
        questType:
          type: string
        category:
          type: string
          enum: [daily, weekly]
        target:
          type: integer
        progress:
          type: integer
        completed:
          type: boolean
        claimed:
          type: boolean
        periodKey:
          type: string
        progressId:
          type: ["integer", "null"]

    QuestsListResponse:
      type: object
      required: [quests]
      properties:
        quests:
          type: array
          items:
            $ref: "#/components/schemas/QuestItem"

    QuestClaimResult:
      type: object
      required: [status, reward, newBalance]
      properties:
        status:
          type: string
          enum: [claimed]
        reward:
          type: integer
        newBalance:
          type: integer

    TaskItem:
      type: object
      required: [id, title, description, reward, taskType, category, status, canClaim]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        reward:
          type: integer
        link:
          type: ["string", "null"]
        taskType:
          type: string
          enum: [automatic, manual]
        category:
          type: string
          enum: [daily, one_time]
        status:
          type: string
          enum: [available, in_progress, pending_approval, completed]
        canClaim:
          type: boolean
        lastCompletedAt:
          type: ["string", "null"]

    TasksListResponse:
      type: object
      required: [tasks]
      properties:
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/TaskItem"

    TaskActionResult:
      type: object
      required: [status, reward, newBalance]
      properties:
        status:
          type: string
          enum: [completed, pending_approval]
        reward:
          type: integer
        newBalance:
          type: integer

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    TelegramAuthInput:
      type: object
      required: [initData]
      properties:
        initData:
          type: string
        referralCode:
          type: ["string", "null"]

    User:
      type: object
      required: [id, telegramId, username, firstName, balance, level, streak, totalMines, isAdmin, isBanned, joinDate]
      properties:
        id:
          type: integer
        telegramId:
          type: string
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: ["string", "null"]
        balance:
          type: integer
        level:
          type: integer
        streak:
          type: integer
        totalMines:
          type: integer
        referredBy:
          type: ["string", "null"]
        referralCode:
          type: string
        isAdmin:
          type: boolean
        isBanned:
          type: boolean
        joinDate:
          type: string
        lastMine:
          type: ["string", "null"]

    AuthResult:
      type: object
      required: [user, isNewUser]
      properties:
        user:
          $ref: "#/components/schemas/User"
        isNewUser:
          type: boolean

    UserProfile:
      type: object
      required: [id, telegramId, username, firstName, balance, level, streak, totalMines, referralCode, totalReferrals, isAdmin, isBanned, joinDate]
      properties:
        id:
          type: integer
        telegramId:
          type: string
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: ["string", "null"]
        balance:
          type: integer
        level:
          type: integer
        streak:
          type: integer
        totalMines:
          type: integer
        referralCode:
          type: string
        referredBy:
          type: ["string", "null"]
        totalReferrals:
          type: integer
        isAdmin:
          type: boolean
        isBanned:
          type: boolean
        joinDate:
          type: string
        lastMine:
          type: ["string", "null"]

    UserStats:
      type: object
      required: [balance, streak, totalMines, totalReferrals, globalRank, canMineNow]
      properties:
        balance:
          type: integer
        streak:
          type: integer
        totalMines:
          type: integer
        totalReferrals:
          type: integer
        globalRank:
          type: integer
        canMineNow:
          type: boolean
        nextMineAt:
          type: ["string", "null"]

    MiningStatus:
      type: object
      required: [state, balance, streak, totalMines, miningRate, estimatedReward]
      properties:
        state:
          type: string
          enum: [idle, mining, claimable]
          description: "idle = no session; mining = session active, timer running; claimable = session complete, ready to claim"
        sessionStartedAt:
          type: ["string", "null"]
          description: ISO timestamp when session started
        sessionEndsAt:
          type: ["string", "null"]
          description: ISO timestamp when session completes (sessionStartedAt + 24h)
        secondsRemaining:
          type: ["integer", "null"]
          description: Seconds left in the current session
        balance:
          type: integer
        streak:
          type: integer
        totalMines:
          type: integer
        miningRate:
          type: number
          description: HP earned per hour in current/next session
        estimatedReward:
          type: integer
          description: Total HP that will be earned when session completes
        lastClaimedAt:
          type: ["string", "null"]

    MiningClaimResult:
      type: object
      required: [hpEarned, bonusHp, totalReward, newBalance, newStreak, newTotalMines]
      properties:
        hpEarned:
          type: integer
          description: Base HP earned
        bonusHp:
          type: integer
          description: Streak bonus HP
        totalReward:
          type: integer
          description: Total HP added to balance
        newBalance:
          type: integer
        newStreak:
          type: integer
        newTotalMines:
          type: integer

    MiningLogEntry:
      type: object
      required: [id, hpEarned, bonusHp, totalHp, streak, minedAt]
      properties:
        id:
          type: integer
        hpEarned:
          type: integer
        bonusHp:
          type: integer
        totalHp:
          type: integer
        streak:
          type: integer
        minedAt:
          type: string

    MiningHistoryResponse:
      type: object
      required: [entries, total]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/MiningLogEntry"
        total:
          type: integer

    ReferralStats:
      type: object
