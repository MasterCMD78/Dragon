# Nixpacks config for the HustleCoin website Railway service.
#
# WHY THIS FILE EXISTS
# --------------------
# When Railway's Root Directory is set to artifacts/website/, Nixpacks reads
# this file (not the repo root nixpacks.toml). Without it, Nixpacks falls back
# to npm, which cannot resolve workspace:* deps.
#
# HOW IT WORKS
# ------------
# Railway clones the entire repo to /app. We install pnpm globally via npm
# (avoids corepack signature-verification issues) then run pnpm install from
# the repo root (/app) so workspace:* deps resolve correctly.
# The build phase is left empty — railway.json's buildCommand handles it.

[phases.install]
cmds = [
  "npm install -g pnpm@10.26.1",
  "cd /app && pnpm install --frozen-lockfile",
]
